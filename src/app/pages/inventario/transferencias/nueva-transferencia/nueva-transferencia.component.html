<div class="modal-backdrop fade show"></div>
<div class="modal fade show" tabindex="-1" style="display: block;">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
      
      <div class="modal-header bg-primary text-white border-0 p-4">
        <h5 class="modal-title fw-bold">
          <i class="fa-solid fa-right-left me-2"></i>Nueva Transferencia de Stock
        </h5>
        <button type="button" class="btn-close btn-close-white" (click)="cancelar.emit()"></button>
      </div>

      <div class="modal-body p-0">
        <div class="row g-0 h-100">
          
          <!-- Lado Izquierdo: Catálogo de Productos -->
          <div class="col-lg-7 border-end d-flex flex-column" style="background: #f8fafc; height: 600px;">
            <div class="p-3 bg-white border-bottom shadow-sm">
              <div class="position-relative">
                <i class="fa-solid fa-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                <input type="text" class="form-control ps-5 rounded-pill border-0 bg-light" 
                       [(ngModel)]="busqueda" placeholder="Buscar producto por nombre o código...">
              </div>
            </div>
            
            <div class="flex-grow-1 overflow-auto p-3">
              <div class="row g-2">
                <div class="col-md-6" *ngFor="let p of productosFiltrados">
                  <div class="card border-0 shadow-sm h-100 hover-card" (click)="agregarProducto(p)">
                    <div class="card-body p-3">
                      <div class="d-flex align-items-center gap-3">
                        <div class="product-icon d-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-3" style="width: 48px; height: 48px;">
                          <i class="fa-solid fa-box fs-5"></i>
                        </div>
                        <div class="flex-grow-1 overflow-hidden">
                          <h6 class="fw-bold text-dark mb-0 text-truncate">{{ p.nombre }}</h6>
                          <div class="text-muted small">Stock: <span class="fw-bold" [class.text-danger]="(p.stock || 0) <= 0">{{ p.stock }}</span> units</div>
                        </div>
                        <div class="text-primary fs-4">
                          <i class="fa-solid fa-plus-circle"></i>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Lado Derecho: Carrito de Transferencia -->
          <div class="col-lg-5 d-flex flex-column" style="height: 600px;">
            <div class="p-4 flex-grow-1 overflow-auto">
              <!-- Sucursal Destino -->
              <div class="mb-4">
                <label class="form-label fw-bold small text-muted text-uppercase mb-2">Destino</label>
                <select class="form-select form-select-lg border-0 shadow-sm bg-light" [(ngModel)]="sucursalDestinoId">
                  <option [ngValue]="null" disabled>-- Seleccionar Sucursal --</option>
                  <option *ngFor="let s of sucursales" [value]="s.id">{{ s.nombre }}</option>
                </select>
              </div>

              <!-- Lista de items a transferir -->
              <label class="form-label fw-bold small text-muted text-uppercase mb-2">Productos a Transferir ({{ carrito.length }})</label>
              <div class="list-group list-group-flush mb-4">
                <div class="list-group-item px-0 border-0 mb-2" *ngFor="let item of carrito; let i = index">
                  <div class="d-flex align-items-center gap-3 p-3 rounded-4 border bg-white shadow-sm">
                    <div class="flex-grow-1 overflow-hidden">
                      <h6 class="fw-bold mb-0 text-truncate">{{ item.producto.nombre }}</h6>
                      <small class="text-muted">Stock actual: {{ item.producto.stock }}</small>
                    </div>
                    <div class="d-flex align-items-center gap-2" style="width: 140px;">
                      <button class="btn btn-sm btn-light border-0" (click)="item.cantidad = item.cantidad - 1; (item.cantidad < 1 ? eliminarDelCarrito(i) : null)">-</button>
                      <input type="number" class="form-control form-control-sm text-center border-0 bg-light fw-bold" 
                             [(ngModel)]="item.cantidad" min="1" [max]="item.producto.stock || 0">
                      <button class="btn btn-sm btn-light border-0" (click)="item.cantidad < (item.producto.stock || 0) ? item.cantidad = item.cantidad + 1 : null">+</button>
                    </div>
                    <button class="btn btn-link text-danger p-0 ms-2" (click)="eliminarDelCarrito(i)">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </div>
                </div>
                <div *ngIf="carrito.length === 0" class="text-center py-5 text-muted bg-light rounded-4 border-dashed border-2">
                  <i class="fa-solid fa-cart-arrow-down fs-1 mb-3"></i>
                  <p class="mb-0">Agrega productos para transferir</p>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold small text-muted text-uppercase mb-2">Notas (Opcional)</label>
                <textarea class="form-control border-0 bg-light shadow-sm" rows="2" [(ngModel)]="notas" placeholder="Razón de la transferencia..."></textarea>
              </div>
            </div>

            <!-- Footer -->
            <div class="p-4 bg-white border-top shadow-lg">
              <div class="d-grid">
                <button class="btn btn-primary btn-lg fw-bold rounded-pill hvr-grow" 
                        [disabled]="guardando || carrito.length === 0 || !sucursalDestinoId" 
                        (click)="confirmar()">
                  <i class="fa-solid fa-share me-2" *ngIf="!guardando"></i>
                  <span *ngIf="guardando" class="spinner-border spinner-border-sm me-2"></span>
                  {{ guardando ? 'Enviando...' : 'ENVIAR TRANSFERENCIA' }}
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
